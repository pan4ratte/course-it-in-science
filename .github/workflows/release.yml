name: Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Extract changelog section
        if: steps.check.outputs.exists == 'false'
        run: |
          awk -v ver="${{ steps.version.outputs.value }}" '
            /^## / {
              if (found) exit
              line = $0
              sub(/^## /, "", line)
              gsub(/[][]/, "", line)
              sub(/^v/, "", line)
              split(line, parts, " - ")
              head = parts[1]
              gsub(/^[ \t]+|[ \t]+$/, "", head)
              if (head == ver) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          body_path: release_notes.md
          generate_release_notes: true
